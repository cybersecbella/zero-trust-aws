---
# requirements.yml
# Ansible Galaxy collections and roles.
# Install with: ansible-galaxy install -r requirements.yml

# ── Collections ───────────────────────────────────────────────────────────────

collections:

  - name: amazon.aws
    version: "8.2.1"        # ec2_security_group, aws_ssm connection, ec2_instance_info

  - name: community.aws
    version: "8.0.0"        # ec2_security_group_info, additional EC2 helpers

  - name: ansible.posix
    version: "1.5.4"        # sysctl, mount, firewalld — used heavily by CIS role

  - name: community.general
    version: "9.1.0"        # ini_file, pam_limits, and other CIS role deps

# ── Roles ─────────────────────────────────────────────────────────────────────

roles:

  - name: ubuntu22-cis
    src: https://github.com/ansible-lockdown/UBUNTU22-CIS
    version: "2.0.1"        # pin — breaking changes land without major bumps
    # After install, role lives at:
    #   ~/.ansible/roles/ubuntu22-cis   (default)
    # or roles/cis_ubuntu22/            (if roles_path set in ansible.cfg)
    #
    # Before first run, review:
    #   roles/cis_ubuntu22/defaults/main.yml  — all toggleable rule vars
    #   roles/cis_ubuntu22/CHANGELOG.md       — check for breaking changes on update